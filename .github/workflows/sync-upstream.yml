name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream changes
        shell: bash
        run: |
          git remote add upstream https://github.com/nesquena/hermes-webui.git 2>/dev/null || \
            git remote set-url upstream https://github.com/nesquena/hermes-webui.git
          git fetch --no-tags upstream master
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "Fork is already up to date with upstream."
            exit 0
          fi

          git merge --no-edit upstream/master
          git push origin HEAD:master
